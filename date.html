<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

h1{
    color:#e91e63;
    text-align:center;
}

.buttons{
    margin-top:30px;
}

button{
    border:none;
    border-radius:12px;
    padding:15px 30px;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#f44336;
    color:white;
    position:absolute;
}

.heart{
    position:fixed;
    font-size:24px;
    animation:fly 3s linear forwards;
}

@keyframes fly{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-300px);
        opacity:0;
    }
}
</style>
</head>
<body>

<h1 id="question">
    Ты пойдешь со мной на свидание? ❤️
</h1>

<div class="buttons">
    <button id="yes">Да ❤️</button>
</div>

<button id="no">Нет 😢</button>

<script>

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

let scale = 1;

const phrases = [
    "Ты точно уверена? 😥",
    "Подумай еще раз ❤️",
    "Ну пожалуйста 🥺",
    "Я же старался 😭",
    "Отказ не принимается 😎",
    "Попробуй поймать кнопку 😁",
    "Судьба уже решила ❤️"
];

function moveButton(){

    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    scale += 0.15;
    yesBtn.style.transform = `scale(${scale})`;

    document.getElementById("question").innerText =
        phrases[Math.floor(Math.random()*phrases.length)];

    createHearts();
}

function createHearts(){
    for(let i=0;i<5;i++){

        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";

        heart.style.left =
            Math.random()*window.innerWidth + "px";

        heart.style.top =
            window.innerHeight + "px";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },3000);
    }
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

yesBtn.addEventListener("click", ()=>{

    document.body.innerHTML = `
        <div style="
            text-align:center;
            font-family:Arial;
        ">
            <h1 style="color:#e91e63;font-size:60px;">
                Урааа! ❤️
            </h1>

            <h2>
                Тогда жду тебя на свидании 😍
            </h2>

            <p style="font-size:22px;">
                Теперь отказаться уже поздно 😎
            </p>
        </div>
    `;
});
</script>

</body>
</html>
